<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHome - Thresholds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 820px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header-content h1 {
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-content p {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 400;
      margin-top: 2px;
    }

    .message-box {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 28px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.3s ease-out;
    }

    .message-box.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .message-box.success::before {
      content: "✓";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: rgba(34, 197, 94, 0.2);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message-box.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .message-box.error::before {
      content: "✕";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: rgba(239, 68, 68, 0.2);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: rgba(255, 255, 255, 0.04);
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 14px 18px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    tbody tr {
      transition: background 0.15s ease;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody tr:not(:last-child) td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    td {
      padding: 14px 18px;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 500;
    }

    td:first-child,
    td:nth-child(2) {
      color: #94a3b8;
      font-weight: 400;
    }

    .room-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .sensor-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(139, 92, 246, 0.1);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    td:last-child {
      text-align: right;
    }

    .value-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"],
    input[type="text"] {
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="number"] {
      width: 90px;
      text-align: center;
    }

    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.08);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input[type="number"]::-webkit-inner-spin-button {
      opacity: 0.5;
    }

    input[type="number"]:hover,
    input[type="text"]:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-group {
      display: flex;
      justify-content: flex-end;
      margin-top: 28px;
      gap: 12px;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
    }

    button[type="submit"]:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
      transform: translateY(-1px);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
    }

    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
      margin-top: 16px;
      margin-bottom: 24px;
    }

    .sensor-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .sensor-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: transparent;
      transition: all 0.3s ease;
    }

    .sensor-card.active-card::before {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    }

    .sensor-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.4);
    }

    .sensor-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .sensor-card-info {
      display: flex;
      flex-direction: column;
    }

    .sensor-card-room {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sensor-card-type {
      font-size: 17px;
      font-weight: 600;
      color: #f1f5f9;
      text-transform: capitalize;
      margin-top: 2px;
    }

    .sensor-card-icon {
      font-size: 24px;
      background: rgba(255, 255, 255, 0.04);
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sensor-card-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-indicator.active {
      background-color: #10b981;
      box-shadow: 0 0 6px #10b981;
    }

    .status-indicator.inactive {
      background-color: #ef4444;
      box-shadow: 0 0 6px #ef4444;
    }

    .status-text {
      font-size: 12px;
      font-weight: 500;
    }

    .status-text.active {
      color: #34d399;
    }

    .status-text.inactive {
      color: #f87171;
    }

    .sensor-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .3s;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: #94a3b8;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
    }

    input:checked + .slider:before {
      transform: translateX(22px);
      background-color: #3b82f6;
    }

    .panel {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .footer-text {
      margin-top: 24px;
      text-align: center;
      color: #475569;
      font-size: 12px;
      font-weight: 400;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 16px;
        border-radius: 16px;
      }

      .header {
        flex-direction: column;
        text-align: center;
        gap: 12px;
      }

      .header-content h1 {
        font-size: 18px;
      }

      td, th {
        padding: 12px 12px;
      }

      input[type="number"] {
        width: 70px;
        padding: 8px 10px;
      }

      .btn-group {
        justify-content: center;
      }

      button[type="submit"] {
        width: 100%;
        justify-content: center;
      }
    }

    .alert-history-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
    }
    
    .alert-history-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Modal styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .modal-title {
      color: #f1f5f9;
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
    }

    .alert-list {
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .alert-item {
      background: rgba(239, 68, 68, 0.05);
      border-left: 3px solid #ef4444;
      padding: 10px 14px;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-icon">⚙</div>
        <div class="header-content">
          <h1>Thresholds Configuration</h1>
          <p>Modify the sensor threshold values for each room</p>
        </div>
      </div>

      <div th:if="${message}" th:class="'message-box ' + (${messageType} ?: 'success')" th:text="${message}"></div>

      <form th:action="@{/changeThresholds}" method="post">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Room</th>
                <th>Sensor Type</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="threshold, iterStat : ${thresholds}">
                <td>
                  <span class="room-badge" th:text="${threshold.room}"></span>
                </td>
                <td>
                  <span class="sensor-badge" th:text="${threshold.sensorType}"></span>
                </td>
                <td>
                  <div class="value-group">
                    <input type="hidden" th:name="thresholds[__${iterStat.index}__].room" th:value="${threshold.room}" />
                    <input type="hidden" th:name="thresholds[__${iterStat.index}__].sensorType"
                      th:value="${threshold.sensorType}" />
                    <input type="number" th:name="thresholds[__${iterStat.index}__].value" th:value="${threshold.value}" />
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="btn-group">
          <button type="submit">💾 Save Changes</button>
        </div>
      </form>

      <div class="panel" style="border-top: 1px solid rgba(255, 255, 255, 0.06); padding-top: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <h2 style="color:#f1f5f9;font-size:16px;font-weight:600;margin:0;">Sensor Health Dashboard</h2>
          <span style="font-size: 13px; color: #94a3b8;" th:text="${sensors.size() + ' Active Sensors'}"></span>
        </div>
        
        <div class="sensor-grid">
          <div th:each="sensor : ${sensors}" th:class="'sensor-card ' + (${sensor.enabled} ? 'active-card' : '')">
            <div class="sensor-card-header">
              <div class="sensor-card-info">
                <span class="sensor-card-room" th:text="${sensor.room}"></span>
                <span class="sensor-card-type" th:text="${sensor.sensorType}"></span>
                <div th:if="${sensor.actuatorName != null}" style="margin-top: 8px; display: flex; align-items: center; gap: 6px;">
                  <span style="font-size: 11px; background: rgba(52, 211, 153, 0.15); color: #34d399; padding: 2px 6px; border-radius: 4px; font-weight: 600;" th:text="'⚙ ' + ${sensor.actuatorName}"></span>
                  <span style="font-size: 11px; color: #94a3b8;" th:text="${sensor.actuatorStatus}"></span>
                </div>
              </div>
              <div class="sensor-card-icon" th:text="${sensor.sensorType.toLowerCase().contains('temp') ? '🌡️' : 
                                                    (sensor.sensorType.toLowerCase().contains('light') ? '💡' : 
                                                     (sensor.sensorType.toLowerCase().contains('humid') ? '💧' : '🔌'))}">
              </div>
            </div>
            
            <button th:if="${sensor.alertHistory != null and !sensor.alertHistory.isEmpty()}" 
                    class="alert-history-btn"
                    th:attr="data-room=${sensor.room}, data-sensor=${sensor.sensorType}, data-alerts=${#strings.listJoin(sensor.alertHistory, '|')}">
              ⚠ View Alert History (<span th:text="${sensor.alertHistory.size()}"></span>)
            </button>
            
            <div class="sensor-card-footer">
              <div class="sensor-card-status">
                <span th:class="'status-indicator ' + (${sensor.enabled} ? 'active' : 'inactive')"></span>
                <span th:class="'status-text ' + (${sensor.enabled} ? 'active' : 'inactive')" 
                      th:text="${sensor.enabled ? 'Online / Good' : 'Offline'}"></span>
              </div>
              
              <form th:action="@{/sensorEnabled}" method="post" style="margin:0;">
                <input type="hidden" name="room" th:value="${sensor.room}" />
                <input type="hidden" name="sensorType" th:value="${sensor.sensorType}" />
                <input type="hidden" name="enabled" th:value="${!sensor.enabled}" />
                <label class="switch">
                  <input type="checkbox" th:checked="${sensor.enabled}" onchange="this.form.submit()" />
                  <span class="slider"></span>
                </label>
              </form>
            </div>
          </div>
        </div>
      </div>

      <form th:action="@{/addSensor}" method="post" class="panel">
        <h2 style="color:#f1f5f9;font-size:16px;font-weight:600;">Add sensor</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr 120px;gap:12px;">
          <input type="text" name="room" placeholder="room" value="bedroom" />
          <input type="text" name="sensorType" placeholder="sensorType" value="humidity" />
          <input type="number" name="value" placeholder="value" value="30" />
        </div>
        <div class="btn-group" style="margin-top:0;">
          <button type="submit">➕ Add Sensor</button>
        </div>
      </form>

      <div class="footer-text">SmartHome Manager v1.0</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="alertModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Alert History</div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="alert-list" id="modalAlertList">
        <!-- Alerts will be injected here -->
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('alertModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalAlertList = document.getElementById('modalAlertList');

    document.querySelectorAll('.alert-history-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const room = btn.getAttribute('data-room');
        const sensor = btn.getAttribute('data-sensor');
        const alertsStr = btn.getAttribute('data-alerts');
        
        modalTitle.textContent = `Alert History: ${room} / ${sensor}`;
        modalAlertList.innerHTML = '';
        
        if (alertsStr) {
          const alerts = alertsStr.split('|');
          alerts.forEach(alert => {
            const div = document.createElement('div');
            div.className = 'alert-item';
            div.textContent = alert;
            modalAlertList.appendChild(div);
          });
        }
        
        modal.classList.add('show');
      });
    });

    function closeModal() {
      modal.classList.remove('show');
    }

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });
  </script>
</body>

</html>
