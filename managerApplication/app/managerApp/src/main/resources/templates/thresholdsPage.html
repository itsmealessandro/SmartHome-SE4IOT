<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartHome - Thresholds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 820px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header-content h1 {
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-content p {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 400;
      margin-top: 2px;
    }

    .message-box {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #4ade80;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 28px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.3s ease-out;
    }

    .message-box::before {
      content: "✓";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: rgba(34, 197, 94, 0.2);
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: rgba(255, 255, 255, 0.04);
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 14px 18px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    tbody tr {
      transition: background 0.15s ease;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody tr:not(:last-child) td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    td {
      padding: 14px 18px;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 500;
    }

    td:first-child,
    td:nth-child(2) {
      color: #94a3b8;
      font-weight: 400;
    }

    .room-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .sensor-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(139, 92, 246, 0.1);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    td:last-child {
      text-align: right;
    }

    .value-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"] {
      width: 90px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      text-align: center;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.08);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input[type="number"]::-webkit-inner-spin-button {
      opacity: 0.5;
    }

    input[type="number"]:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-group {
      display: flex;
      justify-content: flex-end;
      margin-top: 28px;
      gap: 12px;
    }

    button[type="submit"] {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
    }

    button[type="submit"]:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
      transform: translateY(-1px);
    }

    button[type="submit"]:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
    }

    .panel {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 12px;
    }

    .panel input[type="text"],
    .panel input[type="number"] {
      width: 100%;
      text-align: left;
    }

    .footer-text {
      margin-top: 24px;
      text-align: center;
      color: #475569;
      font-size: 12px;
      font-weight: 400;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 24px 16px;
        border-radius: 16px;
      }

      .header {
        flex-direction: column;
        text-align: center;
        gap: 12px;
      }

      .header-content h1 {
        font-size: 18px;
      }

      td, th {
        padding: 12px 12px;
      }

      input[type="number"] {
        width: 70px;
        padding: 8px 10px;
      }

      .btn-group {
        justify-content: center;
      }

      button[type="submit"] {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-icon">⚙</div>
        <div class="header-content">
          <h1>Thresholds Configuration</h1>
          <p>Modify the sensor threshold values for each room</p>
        </div>
      </div>

      <div class="message-box" th:if="${message}" th:text="${message}"></div>

      <form th:action="@{/changeThresholds}" method="post">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Room</th>
                <th>Sensor Type</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="threshold, iterStat : ${thresholds}">
                <td>
                  <span class="room-badge" th:text="${threshold.room}"></span>
                </td>
                <td>
                  <span class="sensor-badge" th:text="${threshold.sensorType}"></span>
                </td>
                <td>
                  <div class="value-group">
                    <input type="hidden" th:name="thresholds[__${iterStat.index}__].room" th:value="${threshold.room}" />
                    <input type="hidden" th:name="thresholds[__${iterStat.index}__].sensorType"
                      th:value="${threshold.sensorType}" />
                    <input type="number" th:name="thresholds[__${iterStat.index}__].value" th:value="${threshold.value}" />
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="btn-group">
          <button type="submit">💾 Save Changes</button>
        </div>
      </form>
